<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP Dashboard - Meera's Baby Shower</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <!-- Dashboard Header -->
    <header class="dashboard-header">
        <div class="container">
            <div class="header-content">
                <h1 class="dashboard-title">
                    <i class="fas fa-chart-line"></i>
                    RSVP Dashboard
                </h1>
                <div class="event-info">
                    <h2>Meera's Baby Shower</h2>
                    <p>Admin Panel</p>
                </div>
                <div class="header-actions">
                    <button id="refresh-btn" class="btn-secondary">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                    <button id="export-btn" class="btn-primary">
                        <i class="fas fa-download"></i>
                        Export CSV
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Statistics Section -->
    <section class="stats-section">
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-content">
                        <h3 class="stat-number" id="total-rsvps">0</h3>
                        <p class="stat-label">Total RSVPs</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-user-check"></i>
                    </div>
                    <div class="stat-content">
                        <h3 class="stat-number" id="total-guests">0</h3>
                        <p class="stat-label">Total Guests Attending</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-child"></i>
                    </div>
                    <div class="stat-content">
                        <h3 class="stat-number" id="under-15">0</h3>
                        <p class="stat-label">Under 15 Guests</p>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-users-cog"></i>
                    </div>
                    <div class="stat-content">
                        <h3 class="stat-number" id="above-15">0</h3>
                        <p class="stat-label">Above 15 Guests</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters and Search -->
    <section class="filters-section">
        <div class="container">
            <div class="filters-content">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search by name, email, or phone...">
                </div>
                
                <div class="filter-group">
                    <label for="filter-attending">Filter by Guests:</label>
                    <select id="filter-attending">
                        <option value="all">All</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4+ Guests</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filter-side">Filter by Side:</label>
                    <select id="filter-side">
                        <option value="all">All Sides</option>
                        <option value="bride-side">Bride's Side</option>
                        <option value="groom-side">Groom's Side</option>
                        <option value="friends">Friends</option>
                        <option value="colleagues">Colleagues</option>
                    </select>
                </div>
                
                <button id="clear-filters" class="btn-secondary">
                    <i class="fas fa-times"></i>
                    Clear Filters
                </button>
            </div>
        </div>
    </section>

    <!-- Guest List Table -->
    <section class="guest-list-section">
        <div class="container">
            <div class="table-container">
                <div class="table-header">
                    <h3>Guest List</h3>
                    <div class="table-info">
                        <span id="guest-count">0 guests</span>
                    </div>
                </div>
                
                <div class="table-wrapper">
                    <table class="guest-table">
                        <thead>
                            <tr>
                                <th>
                                    <button class="sort-btn" data-sort="name">
                                        Name
                                        <i class="fas fa-sort"></i>
                                    </button>
                                </th>
                                <th>
                                    <button class="sort-btn" data-sort="phone">
                                        Phone
                                        <i class="fas fa-sort"></i>
                                    </button>
                                </th>
                                <th>
                                    <button class="sort-btn" data-sort="email">
                                        Email
                                        <i class="fas fa-sort"></i>
                                    </button>
                                </th>
                                <th>
                                    <button class="sort-btn" data-sort="attending">
                                        Guests
                                        <i class="fas fa-sort"></i>
                                    </button>
                                </th>
                                <th>
                                    <button class="sort-btn" data-sort="side">
                                        Side
                                        <i class="fas fa-sort"></i>
                                    </button>
                                </th>
                                <th>Message</th>
                                <th>
                                    <button class="sort-btn" data-sort="date">
                                        Date
                                        <i class="fas fa-sort"></i>
                                    </button>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="guest-table-body">
                            <!-- Guest rows will be populated here -->
                        </tbody>
                    </table>
                </div>
                
                <div class="loading-indicator" id="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>Loading responses...</span>
                </div>
                
                <div class="no-data" id="no-data" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <p>No RSVP responses yet</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Quick Stats -->
    <section class="quick-stats">
        <div class="container">
            <div class="stats-row">
                <div class="quick-stat">
                    <h4>Family Side Breakdown</h4>
                    <div class="side-stats">
                        <div class="side-stat">
                            <span class="side-label">Bride's Side:</span>
                            <span class="side-count" id="bride-count">0</span>
                        </div>
                        <div class="side-stat">
                            <span class="side-label">Groom's Side:</span>
                            <span class="side-count" id="groom-count">0</span>
                        </div>
                        <div class="side-stat">
                            <span class="side-label">Friends:</span>
                            <span class="side-count" id="friends-count">0</span>
                        </div>
                        <div class="side-stat">
                            <span class="side-label">Colleagues:</span>
                            <span class="side-count" id="colleagues-count">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
